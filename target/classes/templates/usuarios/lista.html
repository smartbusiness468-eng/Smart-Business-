<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Clientes')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div class="section-header">
        <div>
            <h1 class="page-title">Clientes</h1>
            <p class="page-subtitle">Gerencie os clientes cadastrados e mantenha sua base organizada.</p>
        </div>
        <a th:href="@{/clientes/novo}" class="btn btn-primary">Novo cliente</a>
    </div>

    <div class="card content-card">
        <div class="card-body table-wrapper">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cliente : ${clientes}">
                    <td>
                        <div class="fw-semibold" th:text="${cliente.nome}">Nome</div>
                    </td>
                    <td th:text="${cliente.email}">email@teste.com</td>
                    <td class="text-end">
                        <a th:href="@{'/clientes/editar/' + ${cliente.id}}" class="btn btn-sm btn-warning me-2">Editar</a>
                        <a th:href="@{'/clientes/excluir/' + ${cliente.id}}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Deseja excluir este cliente?')">Excluir</a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(clientes)}">
                    <td colspan="3" class="text-center py-4 text-muted">
                        Nenhum cliente cadastrado até o momento.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
