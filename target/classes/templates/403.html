<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Acesso negado')}"></head>
<body class="error-page">

<div class="card error-card">
    <div class="card-body p-5 text-center">
        <span class="badge bg-danger mb-3">Erro de acesso</span>
        <h1 class="display-5 text-danger">403</h1>
        <h2 class="h4 mb-3">Acesso negado</h2>
        <p class="text-muted mb-4">Você não tem permissão para acessar esta página.</p>
        <a th:href="@{/}" class="btn btn-primary">Voltar ao painel</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
