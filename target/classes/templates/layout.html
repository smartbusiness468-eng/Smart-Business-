<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Sistema</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Smart Business</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','GERENTE','OPERADOR')">
                    <a class="nav-link" th:href="@{/}">Início</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','GERENTE','OPERADOR')">
                    <a class="nav-link" th:href="@{/clientes}">Clientes</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','GERENTE','OPERADOR')">
                    <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/empresa/usuarios}">Usuários</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/empresa}">Minha Empresa</a>
                </li>
            </ul>

            <span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
                Usuário logado
            </span>

            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
            </form>
        </div>
    </div>
</nav>

</body>
</html>
