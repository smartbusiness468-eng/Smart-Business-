<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Produtos')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="page-title">Produtos</h1>
            <p class="page-subtitle">Gerencie os produtos cadastrados e acompanhe o estoque.</p>
        </div>
        <a th:href="@{/produtos/novo}" class="btn btn-primary">Novo produto</a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div class="card content-card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th class="text-end">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(produtos)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            Nenhum produto cadastrado até o momento.
                        </td>
                    </tr>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.nome}">Produto</td>
                        <td th:text="${produto.descricao ?: '-'}">Descrição</td>
                        <td th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">0,00</td>
                        <td th:text="${produto.quantidadeEstoque}">0</td>
                        <td class="text-end">
                            <a th:href="@{/produtos/editar/{id}(id=${produto.id})}" class="btn btn-sm btn-outline-primary">
                                Editar
                            </a>
                            <a th:href="@{/produtos/excluir/{id}(id=${produto.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Deseja realmente excluir este produto?');">
                                Excluir
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
