<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Venda')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div class="section-header mb-4">
        <div>
            <h1 class="page-title" th:text="${venda.id == null} ? 'Nova Venda' : 'Editar Venda'">Venda</h1>
            <p class="page-subtitle">Preencha os dados da venda e os itens vendidos.</p>
        </div>
    </div>

    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div class="card content-card">
        <div class="card-body">
            <form th:action="@{/vendas/salvar}" th:object="${venda}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label for="dataVenda" class="form-label">Data da venda</label>
                        <input type="date"
                               id="dataVenda"
                               th:field="*{dataVenda}"
                               class="form-control">
                    </div>

                    <div class="col-md-8">
                        <label for="cliente" class="form-label">Cliente</label>
                        <select id="cliente" th:field="*{cliente.id}" class="form-select">
                            <option value="">Selecione um cliente</option>
                            <option th:each="cliente : ${clientes}"
                                    th:value="${cliente.id}"
                                    th:text="${cliente.nome}">
                                Cliente
                            </option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea id="observacoes"
                                  th:field="*{observacoes}"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Informações adicionais sobre a venda"></textarea>
                    </div>
                </div>

                <h5 class="mb-3">Itens da venda</h5>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th style="min-width: 260px;">Produto</th>
                            <th style="width: 140px;">Quantidade</th>
                            <th style="width: 160px;">Preço unitário</th>
                            <th style="width: 160px;">Subtotal</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item, itemStat : *{itens}">
                            <td>
                                <input type="hidden" th:field="*{itens[__${itemStat.index}__].id}">
                                <select th:field="*{itens[__${itemStat.index}__].produto.id}" class="form-select">
                                    <option value="">Selecione um produto</option>
                                    <option th:each="produto : ${produtos}"
                                            th:value="${produto.id}"
                                            th:text="${produto.nome}">
                                        Produto
                                    </option>
                                </select>
                            </td>
                            <td>
                                <input type="number"
                                       min="1"
                                       th:field="*{itens[__${itemStat.index}__].quantidade}"
                                       class="form-control">
                            </td>
                            <td>
                                <input type="number"
                                       step="0.01"
                                       min="0"
                                       th:field="*{itens[__${itemStat.index}__].precoUnitario}"
                                       class="form-control"
                                       readonly>
                            </td>
                            <td>
                                <input type="number"
                                       step="0.01"
                                       min="0"
                                       th:field="*{itens[__${itemStat.index}__].subtotal}"
                                       class="form-control"
                                       readonly>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-3">
                    <div class="alert alert-info mb-0">
                        Nesta versão inicial, o subtotal e o total final são recalculados no servidor ao salvar a venda.
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
                    <div>
                        <strong>Total informado:</strong>
                        <span th:text="${venda.valorTotal != null ? #numbers.formatDecimal(venda.valorTotal, 1, 'POINT', 2, 'COMMA') : '0,00'}">0,00</span>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Salvar venda</button>
                        <a th:href="@{/vendas}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
