<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Produto')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div class="section-header mb-4">
        <div>
            <h1 class="page-title" th:text="${produto.id == null} ? 'Novo Produto' : 'Editar Produto'">Produto</h1>
            <p class="page-subtitle">Preencha os dados do produto.</p>
        </div>
    </div>

    <div class="card content-card">
        <div class="card-body">
            <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text"
                               id="nome"
                               th:field="*{nome}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('nome')} ? ' is-invalid' : ''"
                               placeholder="Digite o nome do produto">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">
                            Erro no nome
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="preco" class="form-label">Preço</label>
                        <input type="number"
                               step="0.01"
                               min="0.01"
                               id="preco"
                               th:field="*{preco}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('preco')} ? ' is-invalid' : ''"
                               placeholder="0,00">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}">
                            Erro no preço
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea id="descricao"
                                  th:field="*{descricao}"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Descreva o produto"></textarea>
                    </div>

                    <div class="col-md-4">
                        <label for="quantidadeEstoque" class="form-label">Quantidade em estoque</label>
                        <input type="number"
                               min="0"
                               id="quantidadeEstoque"
                               th:field="*{quantidadeEstoque}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('quantidadeEstoque')} ? ' is-invalid' : ''"
                               placeholder="0">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidadeEstoque')}" th:errors="*{quantidadeEstoque}">
                            Erro na quantidade
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a th:href="@{/produtos}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
