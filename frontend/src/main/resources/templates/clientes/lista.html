<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Clientes')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="page-title">Clientes</h1>
            <p class="page-subtitle">Gerencie os clientes cadastrados e mantenha sua base organizada.</p>
        </div>
        <a th:href="@{/clientes/novo}" class="btn btn-primary">Novo cliente</a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div class="card content-card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th class="text-end">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="3" class="text-center text-muted py-4">
                            Nenhum cliente cadastrado até o momento.
                        </td>
                    </tr>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.nome}">Nome</td>
                        <td th:text="${cliente.email}">email@exemplo.com</td>
                        <td class="text-end">
                            <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-sm btn-outline-primary">
                                Editar
                            </a>
                            <a th:href="@{/clientes/excluir/{id}(id=${cliente.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Deseja realmente excluir este cliente?');">
                                Excluir
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
