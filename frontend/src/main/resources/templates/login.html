<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" th:href="@{/css/login.css}">
<head th:replace="~{fragments/head :: head('Entrar no sistema')}"></head>
<body class="login-page">

<div class="login-scene">
    <div class="scene-frame"></div>

    <!-- elementos decorativos -->
    <span class="shape shape-ring shape-ring-1"></span>
    <span class="shape shape-ring shape-ring-2"></span>
    <span class="shape shape-ring shape-ring-3"></span>
    <span class="shape shape-wave shape-wave-1"></span>
    <span class="shape shape-wave shape-wave-2"></span>
    <span class="shape shape-pill shape-pill-1"></span>
    <span class="shape shape-pill shape-pill-2"></span>

    <main class="login-glass">
        <div class="login-logo">
            <div class="logo-mark">SB</div>
            <div class="logo-copy">
                <strong>Smart Business</strong>
                <small>Plataforma de gestão empresarial</small>
            </div>
        </div>

        <div class="login-header">
            <h1>Entrar no sistema</h1>
            <p>Use seu e-mail e senha para acessar o painel administrativo.</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger custom-alert">
            Usuário ou senha inválidos.
        </div>

        <div th:if="${param.logout}" class="alert alert-success custom-alert">
            Logout realizado com sucesso.
        </div>

        <div th:if="${param.cadastroSucesso}" class="alert alert-success custom-alert">
            Cadastro realizado com sucesso. Faça login para continuar.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label for="username">E-mail</label>
                <input
                        type="email"
                        id="username"
                        name="username"
                        class="form-control login-input"
                        placeholder="voce@empresa.com"
                        required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control login-input"
                        placeholder="Digite sua senha"
                        required>
            </div>

            <button type="submit" class="btn login-button">
                Entrar
            </button>
        </form>

        <div class="login-footer">
            <span>Primeiro acesso?</span>
            <a th:href="@{/cadastro}">Cadastrar minha empresa</a>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
